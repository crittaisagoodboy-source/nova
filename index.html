<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>lds13 — UI Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --background:#0d0f12;
    --inline:#16191e;
    --outline:#1a1e24;
    --text:#c8c8c8;
    --dark-text:#646464;
    --element:#1c2026;
    --accent:#b8d4ff;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:transparent;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(184,212,255,0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(184,212,255,0.04), transparent 40%);
    font-family:'Inter', sans-serif;
    color:var(--text);
    overflow:hidden;
  }

  .backdrop-hint{
    position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:center;
    pointer-events:none; padding-bottom:18px;
  }
  .backdrop-hint span{ font-size:11px; letter-spacing:.04em; color:#3a3d42; }

  /* ===================== WINDOW ===================== */
  .lib-window{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:660px; height:520px;
    min-width:480px; min-height:380px;
    background:var(--background);
    border-radius:10px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.02);
    display:flex; flex-direction:column;
    user-select:none;
  }

  .lib-resize-handle{
    position:absolute; right:0; bottom:0; width:16px; height:16px; cursor:nwse-resize;
    border-radius:0 0 10px 0;
  }
  .lib-resize-handle::after{
    content:""; position:absolute; right:4px; bottom:4px; width:6px; height:6px;
    border-right:2px solid var(--outline); border-bottom:2px solid var(--outline);
  }

  /* ---------- top bar ---------- */
  .lib-top{
    position:relative;
    height:50px; min-height:50px;
    background:var(--inline);
    border-radius:10px 10px 0 0;
    border-bottom:1px solid var(--outline);
    display:flex; align-items:center;
    padding:0 12px;
    cursor:grab;
    background-image:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
  }
  .lib-top:active{cursor:grabbing;}

  .lib-avatar{ width:30px; height:30px; border-radius:50%; overflow:hidden; border:1px solid var(--outline); flex-shrink:0; }
  .lib-avatar img{ width:100%; height:100%; object-fit:cover; }
  .lib-id{margin-left:10px; display:flex; flex-direction:column; gap:1px;}
  .lib-username{font-size:14px; color:var(--text); font-weight:500; line-height:1;}
  .lib-time{font-size:11px; color:var(--text); opacity:.5; line-height:1;}

  .lib-tabs{ margin-left:auto; display:flex; align-items:center; gap:8px; }
  .lib-tab{
    width:30px; height:30px; border-radius:6px;
    background:var(--background);
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    position:relative; transition:background .15s;
  }
  .lib-tab svg{width:16px; height:16px; opacity:.5; transition:opacity .15s, fill .15s;}
  .lib-tab:hover svg, .lib-tab.dui-hover svg{opacity:.85;}
  .lib-tab.active svg{opacity:1; fill:#0d0f12;}
  .lib-tab .accent-fill{
    position:absolute; inset:0; border-radius:6px; background:var(--accent);
    transform:scale(0); transition:transform .25s cubic-bezier(.2,.9,.3,1);
    background-image:linear-gradient(135deg,#fff,#aaa); z-index:0;
  }
  .lib-tab.active .accent-fill{transform:scale(1);}
  .lib-tab svg{position:relative; z-index:1;}

  /* ---------- content ---------- */
  .lib-content{ flex:1; position:relative; overflow:hidden; }
  .lib-page{ position:absolute; inset:0; display:none; }
  .lib-page.active{display:flex;}
  .lib-columns{ display:flex; width:100%; height:100%; }
  .lib-column{
    flex:1; overflow-y:auto; padding:12px; padding-right:11px;
    display:flex; flex-direction:column; gap:12px;
    scrollbar-width:thin; scrollbar-color:var(--outline) transparent;
  }
  .lib-column::-webkit-scrollbar{width:5px;}
  .lib-column::-webkit-scrollbar-thumb{background:var(--outline); border-radius:3px;}

  /* ---------- section ---------- */
  .lib-section{
    background:var(--inline);
    border:1px solid var(--outline);
    border-radius:8px;
    padding:10px 10px 14px 10px;
  }
  .lib-section-head{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .lib-section-icon{
    width:25px; height:25px; border-radius:6px;
    background:var(--accent);
    background-image:linear-gradient(135deg,#fff,#d1d1d1);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .lib-section-icon svg{width:14px; height:14px; fill:#0d0f12;}
  .lib-section-title{font-size:14px; color:var(--text); font-weight:500;}
  .lib-section-content{display:flex; flex-direction:column; gap:10px;}

  /* ---------- generic row ---------- */
  .lib-row-label{font-size:14px; color:var(--dark-text); transition:color .15s; cursor:default;}
  .lib-row:hover .lib-row-label, .lib-row.dui-hover .lib-row-label{color:var(--text);}

  /* ---------- toggle ---------- */
  .lib-toggle{ display:flex; align-items:center; gap:10px; cursor:pointer; min-height:16px; }
  .lib-toggle-box{
    width:16px; height:16px; border-radius:5px; background:var(--element);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    position:relative; overflow:hidden;
  }
  .lib-toggle-fill{
    position:absolute; inset:0; border-radius:5px; background:var(--accent);
    background-image:linear-gradient(135deg,#fff,#d1d1d1);
    transform:scale(0); transition:transform .35s cubic-bezier(.2,.9,.3,1);
  }
  .lib-toggle.on .lib-toggle-fill{transform:scale(1);}
  .lib-toggle-check{position:relative; z-index:1; width:8px; height:8px; opacity:0; transition:opacity .15s; fill:#0d0f12;}
  .lib-toggle.on .lib-toggle-check{opacity:1;}
  .lib-toggle .lib-row-label{transition:color .15s;}
  .lib-toggle.on .lib-row-label{color:var(--text);}
  .lib-toggle:hover .lib-row-label, .lib-toggle.dui-hover .lib-row-label{color:var(--text);}
  .lib-sub{margin-left:auto; display:flex; align-items:center; gap:6px;}

  /* ---------- slider ---------- */
  .lib-slider{display:flex; flex-direction:column; gap:6px; height:36px; justify-content:space-between;}
  .lib-slider-head{display:flex; justify-content:space-between; font-size:14px;}
  .lib-slider-head .lib-row-label{color:var(--dark-text);}
  .lib-slider-value{color:var(--dark-text); transition:color .15s;}
  .lib-slider-track{
    position:relative; height:10px; border-radius:10px; background:var(--element); cursor:pointer;
  }
  .lib-slider-fill{
    position:absolute; inset:0; width:60%; border-radius:10px; background:var(--accent);
    background-image:linear-gradient(180deg,#fff,#aaa);
  }
  .lib-slider-dragger{
    position:absolute; right:0; top:50%; width:10px; height:10px; border-radius:50%;
    background:linear-gradient(180deg,#fff,#aaa); transform:translate(50%,-50%);
  }
  .lib-slider:hover .lib-row-label, .lib-slider:hover .lib-slider-value,
  .lib-slider.dui-hover .lib-row-label, .lib-slider.dui-hover .lib-slider-value{color:var(--text);}

  /* ---------- dropdown ---------- */
  .lib-dropdown{display:flex; flex-direction:column; gap:6px;}
  .lib-dropdown-label{font-size:14px; color:var(--dark-text); transition:color .15s;}
  .lib-dropdown:hover .lib-dropdown-label, .lib-dropdown.dui-hover .lib-dropdown-label{color:var(--text);}
  .lib-dropdown-box{
    height:24px; border-radius:5px; background:var(--element);
    display:flex; align-items:center; padding:0 10px; cursor:pointer; gap:8px;
  }
  .lib-dropdown-box span{font-size:14px; color:var(--dark-text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:color .15s;}
  .lib-dropdown-box:hover span, .lib-dropdown-box.dui-hover span{color:var(--text);}
  .lib-dropdown-box svg{width:14px; height:14px; opacity:.5; flex-shrink:0; transition:transform .2s;}
  .lib-dropdown-box.open svg{transform:rotate(180deg);}
  .lib-dropdown-popup{
    position:fixed; z-index:9999; background:var(--background);
    border:1px solid var(--outline); border-radius:6px; padding:6px;
    max-height:0; overflow:hidden; transition:max-height .2s; opacity:0;
    pointer-events:none;
  }
  .lib-dropdown-popup.open{max-height:140px; overflow-y:auto; opacity:1; pointer-events:auto;}
  .lib-dropdown-option{
    padding:5px 8px; font-size:13px; color:var(--dark-text); border-radius:5px; cursor:pointer;
    transition:background .15s, color .15s; margin-bottom:4px;
  }
  .lib-dropdown-option:last-child{margin-bottom:0;}
  .lib-dropdown-option:hover, .lib-dropdown-option.dui-hover{color:var(--text);}
  .lib-dropdown-option.selected{
    background:var(--accent); background-image:linear-gradient(135deg,#fff,#aaa); color:#0d0f12;
  }

  /* ---------- button ---------- */
  .lib-button{
    height:22px; border-radius:5px; background:var(--element);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    position:relative; overflow:hidden; border:none;
  }
  .lib-button span{position:relative; z-index:1; font-size:14px; color:var(--dark-text); transition:color .15s;}
  .lib-button .accent-fill{
    position:absolute; inset:0; background:var(--accent);
    background-image:linear-gradient(135deg,#fff,#aaa);
    opacity:0; transform:scale(.6); transition:opacity .2s, transform .2s;
  }
  .lib-button:active .accent-fill, .lib-button.dui-active .accent-fill{opacity:1; transform:scale(1);}
  .lib-button:active span, .lib-button.dui-active span{color:#0d0f12;}
  .lib-button:hover span, .lib-button.dui-hover span{color:var(--text);}

  /* ---------- label row ---------- */
  .lib-label-row{display:flex; align-items:center; min-height:16px;}

  /* ---------- textbox ---------- */
  .lib-textbox-wrap{height:24px;}
  .lib-textbox{
    width:100%; height:100%; border-radius:5px; background:var(--element);
    border:none; outline:none; color:var(--text); font-family:inherit;
    padding:0 10px; font-size:14px;
  }
  .lib-textbox::placeholder{color:var(--dark-text);}

  /* ---------- colorpicker ---------- */
  .lib-swatch{
    width:16px; height:16px; border-radius:5px; cursor:pointer;
    background-image:linear-gradient(135deg,#fff,#d1d1d1);
    border:1px solid rgba(0,0,0,.2);
  }
  .lib-colorpicker-popup{
    position:fixed; z-index:9999; width:180px; background:var(--background);
    border:1px solid var(--outline); border-radius:6px; padding:8px;
    max-height:0; overflow:hidden; opacity:0; transition:max-height .2s, opacity .2s;
    pointer-events:none;
  }
  .lib-colorpicker-popup.open{max-height:163px; opacity:1; pointer-events:auto;}
  .lib-cp-row{display:flex; gap:8px; height:147px;}
  .lib-cp-sv{ position:relative; flex:1; border-radius:6px; cursor:crosshair; overflow:hidden; }
  .lib-cp-sv .white{position:absolute; inset:0; background:linear-gradient(to right, #fff, rgba(255,255,255,0));}
  .lib-cp-sv .black{position:absolute; inset:0; background:linear-gradient(to top, #000, rgba(0,0,0,0));}
  .lib-cp-dragger{ position:absolute; width:8px; height:8px; border-radius:50%; border:1px solid #fff; transform:translate(-50%,-50%); pointer-events:none; }
  .lib-cp-hue{ position:relative; width:12px; border-radius:6px; cursor:pointer; background:linear-gradient(to bottom, red, yellow, lime, cyan, blue, magenta, red); }
  .lib-cp-hue-dragger{ position:absolute; left:50%; width:12px; height:12px; border-radius:50%; border:1px solid #fff; transform:translate(-50%,-50%); pointer-events:none; }

  /* ---------- keybind ---------- */
  .lib-keybind-btn{ font-size:14px; color:var(--dark-text); background:none; border:none; cursor:pointer; white-space:nowrap; transition:color .15s; }
  .lib-keybind-btn:hover, .lib-keybind-btn.dui-hover{color:var(--text);}
  .lib-keybind-popup{
    position:fixed; z-index:9999; width:67px; background:var(--background);
    border:1px solid var(--outline); border-radius:6px; padding:6px 0 6px 8px;
    max-height:0; overflow:hidden; opacity:0; transition:max-height .2s, opacity .2s;
    pointer-events:none;
  }
  .lib-keybind-popup.open{max-height:80px; opacity:1; pointer-events:auto;}
  .lib-keybind-mode{ font-size:13px; color:var(--dark-text); padding:2px 0; cursor:pointer; transition:color .15s; }
  .lib-keybind-mode:hover, .lib-keybind-mode.active{color:var(--text);}

  /* ---------- bottom bar ---------- */
  .lib-bottom{
    height:50px; min-height:50px; background:var(--inline);
    border-radius:0 0 10px 10px; border-top:1px solid var(--outline);
    display:flex; align-items:center; padding:0 12px; position:relative;
    background-image:linear-gradient(0deg, rgba(255,255,255,.05), rgba(255,255,255,0));
  }
  .lib-bottom-text{display:flex; flex-direction:column; gap:1px;}
  .lib-bottom-title{font-size:14px; color:var(--text); font-weight:500; line-height:1;}
  .lib-bottom-sub{font-size:11px; color:var(--text); opacity:.5; line-height:1;}
  .lib-bottom-right{margin-left:auto; display:flex; align-items:center; gap:8px;}
  .lib-search{
    height:30px; width:33px; border-radius:6px; background:var(--background);
    display:flex; align-items:center; justify-content:flex-end; overflow:hidden;
    transition:width .2s; cursor:pointer;
  }
  .lib-search.expanded{width:160px;}
  .lib-search input{ flex:1; background:none; border:none; outline:none; color:var(--text); font-family:inherit; font-size:14px; padding-left:10px; min-width:0; }
  .lib-search input::placeholder{color:#b9b9b9;}
  .lib-search svg{width:16px; height:16px; opacity:.5; margin-right:8px; flex-shrink:0; transition:opacity .15s;}
  .lib-search:hover svg{opacity:1;}
  .lib-gear{ width:30px; height:30px; border-radius:6px; background:var(--background); display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
  .lib-gear svg{width:16px; height:16px; opacity:.5; transition:opacity .15s;}
  .lib-gear:hover svg{opacity:1;}

  /* ---------- settings popup ---------- */
  .lib-settings-popup{
    position:fixed; z-index:9999; width:325px; background:var(--background);
    border:1px solid var(--outline); border-radius:6px;
    max-height:0; overflow:hidden; opacity:0; transition:max-height .2s, opacity .2s;
    pointer-events:none; display:flex; flex-direction:column;
  }
  .lib-settings-popup.open{max-height:240px; opacity:1; pointer-events:auto;}
  .lib-settings-list{flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px;}
  .lib-settings-row{display:flex; align-items:center; justify-content:space-between; padding:2px 4px;}
  .lib-settings-row span{font-size:13px; color:var(--dark-text);}
  .lib-settings-close{ margin:0 8px 8px 8px; height:22px; border-radius:4px; background:var(--element); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .lib-settings-close span{font-size:14px; color:var(--dark-text); transition:color .15s;}
  .lib-settings-close:hover span{color:var(--text);}

  /* ---------- notifications ---------- */
  .lib-notif-holder{ position:fixed; top:16px; right:16px; z-index:10000; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  .lib-notif{
    background:var(--background); border:1px solid var(--outline); border-radius:6px;
    padding:8px 14px 8px 10px; display:flex; align-items:center; gap:10px;
    font-size:14px; color:var(--text); opacity:0; transform:translateX(12px);
    transition:opacity .35s, transform .35s;
    box-shadow:0 10px 25px -10px rgba(0,0,0,.6);
  }
  .lib-notif.show{opacity:1; transform:translateX(0);}
  .lib-notif svg{width:16px; height:16px; opacity:.8; flex-shrink:0;}

  /* ---------- reopen + hint ---------- */
  .lib-reopen{
    position:fixed; bottom:24px; left:24px; z-index:9998;
    width:54px; height:54px; border-radius:50%; background:var(--background);
    border:1px solid var(--outline); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:11px; color:var(--text); opacity:0; pointer-events:none;
    transition:opacity .2s; box-shadow:0 10px 25px -10px rgba(0,0,0,.7);
  }
  .lib-reopen.show{opacity:1; pointer-events:auto;}
  .lib-hint-key{ position:fixed; bottom:24px; right:24px; font-size:11px; color:#4a4d52; z-index:9998; }
  .lib-hint-key kbd{ background:var(--inline); border:1px solid var(--outline); border-radius:4px; padding:2px 6px; color:var(--dark-text); font-family:inherit; }

  /* ---------- custom cursor ---------- */
  #customCursor{ position:fixed; width:0; height:0; pointer-events:none; z-index:999999; }
  #customCursor img{ position:absolute; top:0; left:0; width:20px; height:20px; display:block; image-rendering:pixelated; }
</style>
</head>
<body>

<div id="customCursor"><img id="cursorImg" src="" alt=""></div>
<div class="backdrop-hint"><span> </span></div>
<div class="lib-notif-holder" id="notifHolder"></div>
<div class="lib-reopen" id="reopenBtn">Open</div>
<div class="lib-hint-key">Toggle: <kbd>F3</kbd></div>

<div class="lib-window" id="window">
  <div class="lib-top" id="dragHandle">
    <div class="lib-avatar">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC4dKS04pFlKm8OqTWPQRdUPBZVTVgzEnSx7G4ZHJH4Q&s=10">
    </div>
    <div class="lib-id">
      <div class="lib-username">mjh dev</div>
      <div class="lib-time">Time remaining: 6h 42m</div>
    </div>
    <div class="lib-tabs" id="tabBar"></div>
  </div>

  <div class="lib-content" id="content"></div>

  <div class="lib-bottom" id="bottomBar">
    <div class="lib-bottom-text">
      <div class="lib-bottom-title">lds13</div>
      <div class="lib-bottom-sub">v1.0 · html edition</div>
    </div>
    <div class="lib-bottom-right">
      <div class="lib-search" id="search">
        <input type="text" id="searchInput" placeholder="">
        <svg viewBox="0 0 24 24" fill="none"><path d="M10 18a8 8 0 1 1 5.29-14.04A8 8 0 0 1 10 18Zm11 3-6.05-6.05" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text)"/></svg>
      </div>
      <button class="lib-gear" id="gearBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" style="color:var(--text)"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V19a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H4a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.05A1.65 1.65 0 0 0 11 4.09V4a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.05a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.05a1.65 1.65 0 0 0 1.51 1H20a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="2" style="color:var(--text)"/></svg>
      </button>
    </div>
  </div>

  <div class="lib-resize-handle" id="resizeHandle"></div>
</div>

<script>
(function(){

  const ICONS = {
    home:  '<svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5 12 4l9 7.5M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',

  function el(tag, cls, html){
    const e = document.createElement(tag);

    return e;

  function hsvToHex(h,s,v){
    let r,g,b;
    const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
    switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
    const toHex=c=>('0'+Math.round(c*255).toString(16)).slice(-2);
    return '#'+toHex(r)+toHex(g)+toHex(b);
  }

  /* ── DUI HOVER ───────────────────────────────────────────────── */
  let _lastHovered = null;
  function duiHover(x, y){
    const target = document.elementFromPoint(x, y);
    if(_lastHovered){
      let node = _lastHovered;
      while(node && node !== document.body){ node.classList.remove('dui-hover'); node = node.parentElement; }
    }
    if(!target || target === document.body || target === document.documentElement){ _lastHovered = null; return; }
    let node = target;
    while(node && node !== document.body){ node.classList.add('dui-hover'); node = node.parentElement; }
    _lastHovered = target;
  }



function sendToLua(data){
  window.parent.postMessage(data, '*');
}
  
  /* ── DUI SCROLL ──────────────────────────────────────────────── */
  function duiScroll(x, y, amount){
    let target = document.elementFromPoint(x, y);
    while(target && target !== document.body){
      const style = getComputedStyle(target);
      const oy = style.overflowY;
      if((oy==='auto'||oy==='scroll') && target.scrollHeight > target.clientHeight){
        target.scrollBy({top: -amount*80, behavior:'smooth'});
        return;
      }
      target = target.parentElement;
    }
  }

  /* ── SECTION FACTORY ─────────────────────────────────────────── */
  function makeSection(name, iconKey){
    const section = el('div','lib-section');
    const head    = el('div','lib-section-head');
    const icon    = el('div','lib-section-icon', ICONS[iconKey] || ICONS.cog);
    const title   = el('div','lib-section-title', name);
    head.append(icon, title);
    const body = el('div','lib-section-content');
    section.append(head, body);
    const api = { node: section };

    /* toggle */
    api.toggle = function(opts){
      const row  = el('div','lib-toggle lib-row');
      row.dataset.eid = opts.id || '';
      const box  = el('div','lib-toggle-box');
      const fill = el('div','lib-toggle-fill', ICONS.check);
      box.append(fill);
      const label = el('div','lib-row-label', opts.name);
      const sub   = el('div','lib-sub');
      row.append(box, label, sub);
      body.append(row);
      let value = !!opts.default;
      function set(v){ value=v; row.classList.toggle('on',v); flags[opts.flag||opts.name]=v; if(opts.callback) opts.callback(v); }
      row.addEventListener('click', ()=> set(!value));
      set(value);
      return { node:row, sub, set, get:()=>value };
    };

    /* slider */
    api.slider = function(opts){
      const min=opts.min??0, max=opts.max??100, suffix=opts.suffix||'';
      const row     = el('div','lib-slider lib-row');
      row.dataset.eid = opts.id || '';
      row.dataset.min = min;
      row.dataset.max = max;
      const headRow   = el('div','lib-slider-head');
      const label     = el('div','lib-row-label', opts.name);
      const valueText = el('div','lib-slider-value','');
      headRow.append(label, valueText);
      const track = el('div','lib-slider-track');
      const fill  = el('div','lib-slider-fill');
      const drag  = el('div','lib-slider-dragger');
      fill.append(drag);
      track.append(fill);
      row.append(headRow, track);
      body.append(row);
      let value = opts.default ?? min;
      function clamp(v){ return Math.min(max, Math.max(min, v)); }
      function set(v){
        value = clamp(v);
        const pct = (value-min)/(max-min);
        fill.style.width = (pct*100)+'%';
        valueText.textContent = (Math.round(value*100)/100)+suffix;
        flags[opts.flag||opts.name]=value;
        if(opts.callback) opts.callback(value);
      }
      let dragging=false;
      function fromEvent(e){ const r=track.getBoundingClientRect(); set(min+(e.clientX-r.left)/r.width*(max-min)); }
      track.addEventListener('mousedown', e=>{ dragging=true; fromEvent(e); });
      window.addEventListener('mousemove', e=>{ if(dragging) fromEvent(e); });
      window.addEventListener('mouseup', ()=> dragging=false);
      set(value);
      return { node:row, set, get:()=>value };
    };

    /* dropdown */
    api.dropdown = function(opts){
      const items = opts.items || [];
      const row   = el('div','lib-dropdown lib-row');
      row.dataset.eid = opts.id || '';
      const label = el('div','lib-dropdown-label', opts.name);
      const box   = el('div','lib-dropdown-box');
      const span  = el('span', null, items[0] || '...');
      const chev  = el('div',null,'<svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text)"/></svg>');
      box.append(span, chev);
      row.append(label, box);
      body.append(row);
      const popup = el('div','lib-dropdown-popup');
      document.body.append(popup);
      let open=false, value=items[0]||null;
      function buildOptions(){
        popup.innerHTML='';
        items.forEach(name=>{
          const opt=el('div','lib-dropdown-option',name);
          opt.classList.toggle('selected', name===value);
          opt.addEventListener('click', e=>{
            e.stopPropagation();
            value=name; span.textContent=value; buildOptions();
            flags[opts.flag||opts.name]=value;
            if(opts.callback) opts.callback(value);
            setOpen(false);
          });
          popup.append(opt);
        });
      }
      buildOptions();
      function setOpen(v){
        open=v; box.classList.toggle('open',v);
        if(v){ const r=box.getBoundingClientRect(); popup.style.left=r.left+'px'; popup.style.top=(r.bottom+5)+'px'; popup.style.width=r.width+'px'; }
        popup.classList.toggle('open',v);
      }
      box.addEventListener('click', e=>{ e.stopPropagation(); setOpen(!open); });
      document.addEventListener('mousedown', e=>{ if(open&&!popup.contains(e.target)&&!box.contains(e.target)) setOpen(false); });
      return {
        node: row,
        set: v=>{ value=v; span.textContent=v; buildOptions(); },
        setByIndex: idx=>{ if(items[idx]!=null){ value=items[idx]; span.textContent=value; buildOptions(); } },
        get: ()=>value
      };
    };

    /* button */
    api.button = function(opts){
      const row  = el('button','lib-button lib-row');
      row.dataset.eid = opts.id || '';
      const span = el('span', null, opts.name);
      const fill = el('div','accent-fill');
      row.append(fill, span);
      body.append(row);
      row.addEventListener('click', ()=>{ if(opts.callback) opts.callback(); });
      return { node:row };
    };

    /* textbox */
    api.textbox = function(opts){
      const wrap  = el('div','lib-textbox-wrap lib-row');
      const input = el('input','lib-textbox');
      input.type = 'text';
      input.placeholder = opts.placeholder||'';
      if(opts.numeric) input.addEventListener('input', ()=>{ input.value=input.value.replace(/[^0-9.\-]/g,''); });
      wrap.append(input);
      body.append(wrap);
      input.addEventListener('input', ()=>{ flags[opts.flag||opts.name]=input.value; if(opts.callback) opts.callback(input.value); });
      if(opts.default) input.value=opts.default;
      return { node:wrap, get:()=>input.value };
    };

    /* label */
    api.label = function(name){
      const row   = el('div','lib-label-row lib-row');
      const label = el('div','lib-row-label', name);
      const sub   = el('div','lib-sub');
      row.append(label, sub);
      body.append(row);
      const labelApi = { node:row, sub };
      labelApi.colorpicker = function(opts){ return makeColorpicker(sub, opts); };
      labelApi.keybind     = function(opts){ return makeKeybind(sub, opts); };
      return labelApi;
    };

    return api;
  }

  /* ── COLORPICKER ─────────────────────────────────────────────── */
  function makeColorpicker(parent, opts){
    const swatch = el('div','lib-swatch');
    let hue=0,sat=0,val=1;
    function defaultToHsv(hex){
      const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
      const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
      let h=0; if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; }
      h/=6; if(h<0) h+=1;
      return [h, mx===0?0:d/mx, mx];
    }
    const def=opts.default||'#ffffff';
    [hue,sat,val]=defaultToHsv(def);
    swatch.style.background=def;
    parent.append(swatch);
    const popup=el('div','lib-colorpicker-popup');
    const row=el('div','lib-cp-row');
    const sv=el('div','lib-cp-sv');
    sv.append(el('div','white'),el('div','black'));
    const svDrag=el('div','lib-cp-dragger');
    sv.append(svDrag);
    const hueBar=el('div','lib-cp-hue');
    const hueDrag=el('div','lib-cp-hue-dragger');
    hueBar.append(hueDrag);
    row.append(sv,hueBar);
    popup.append(row);
    document.body.append(popup);
    function update(){ const hex=hsvToHex(hue,sat,val); swatch.style.background=hex; sv.style.background=hsvToHex(hue,1,1); svDrag.style.left=(sat*100)+'%'; svDrag.style.top=((1-val)*100)+'%'; hueDrag.style.top=(hue*100)+'%'; if(opts.callback) opts.callback(hex); }
    let open=false;
    function setOpen(v){ open=v; if(v){ const r=swatch.getBoundingClientRect(); popup.style.left=(r.left-160)+'px'; popup.style.top=(r.bottom+5)+'px'; } popup.classList.toggle('open',v); }
    swatch.addEventListener('click', e=>{ e.stopPropagation(); setOpen(!open); });
    document.addEventListener('mousedown', e=>{ if(open&&!popup.contains(e.target)&&!swatch.contains(e.target)) setOpen(false); });
    let dSV=false,dHue=false;
    function fromSV(e){ const r=sv.getBoundingClientRect(); sat=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)); val=1-Math.min(1,Math.max(0,(e.clientY-r.top)/r.height)); update(); }
    function fromHue(e){ const r=hueBar.getBoundingClientRect(); hue=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height)); update(); }
    sv.addEventListener('mousedown', e=>{ dSV=true; fromSV(e); });
    hueBar.addEventListener('mousedown', e=>{ dHue=true; fromHue(e); });
    window.addEventListener('mousemove', e=>{ if(dSV) fromSV(e); if(dHue) fromHue(e); });
    window.addEventListener('mouseup', ()=>{ dSV=false; dHue=false; });
    update();
    return { node:swatch, set:(hex)=>{ [hue,sat,val]=defaultToHsv(hex); update(); } };
  }

  /* ── KEYBIND ─────────────────────────────────────────────────── */
  function makeKeybind(parent, opts){
    const btn=el('button','lib-keybind-btn', opts.default||'None');
    parent.append(btn);
    const popup=el('div','lib-keybind-popup');
    const modes=['Toggle','Hold','Always'];
    let mode=opts.mode||'Toggle';
    const modeEls={};
    modes.forEach(m=>{ const me=el('div','lib-keybind-mode',m); me.addEventListener('click', e=>{ e.stopPropagation(); mode=m; refreshModes(); }); popup.append(me); modeEls[m]=me; });
    document.body.append(popup);
    function refreshModes(){ modes.forEach(m=> modeEls[m].classList.toggle('active', m===mode)); }
    refreshModes();
    let open=false;
    function setOpen(v){ open=v; if(v){ const r=btn.getBoundingClientRect(); popup.style.left=(r.left-50)+'px'; popup.style.top=(r.bottom+5)+'px'; } popup.classList.toggle('open',v); }
    btn.addEventListener('contextmenu', e=>{ e.preventDefault(); setOpen(!open); });
    document.addEventListener('mousedown', e=>{ if(open&&!popup.contains(e.target)&&!btn.contains(e.target)) setOpen(false); });
    let picking=false;
    btn.addEventListener('click', ()=>{
      picking=true; btn.textContent='Press a key…';
      function handler(e){ btn.textContent=e.key.length===1?e.key.toUpperCase():e.key; picking=false; window.removeEventListener('keydown',handler); if(opts.callback) opts.callback(btn.textContent, mode); }
      window.addEventListener('keydown', handler);
    });
    return { node:btn };
  }

  /* ── PAGES / TABS ────────────────────────────────────────────── */
  function makePage(name, iconKey){
    const tab = el('button','lib-tab');
    tab.append(el('div','accent-fill'));
    tab.insertAdjacentHTML('beforeend', ICONS[iconKey] || ICONS.cog);
    tabBar.append(tab);
    const page = el('div','lib-page');
    const cols = el('div','lib-columns');
    const left = el('div','lib-column');
    const right= el('div','lib-column');
    cols.append(left, right);
    page.append(cols);
    content.append(page);
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.lib-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.lib-page').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      page.classList.add('active');
    });
    const _sectionCache = {};
    return {
      activate(){ tab.click(); },
      section(name, side, iconKey){
        const key = name+':'+(side||1);
        if(_sectionCache[key]) return _sectionCache[key];
        const s = makeSection(name, iconKey);
        (side===2 ? right : left).append(s.node);
        _sectionCache[key] = s;
        return s;
      }
    };
  }

    window.addEventListener('mouseup', ()=> resizing=false);

  /* ── MESSAGE BRIDGE ──────────────────────────────────────────── */
  window.addEventListener('message', (event) => {
    const data = event.data;
    if(!data || !data.type) return;

    /* cursor */
    if(data.type==='mouseMove' || data.type==='mouseHover'){
      _cursorX=data.x; _cursorY=data.y;
      cursor.style.left=data.x+'px';
      cursor.style.top =data.y+'px';
      duiHover(data.x, data.y);
    }

    /* click */
    if(data.type==='click'){
      let element=document.elementFromPoint(data.x, data.y);
      while(element && typeof element.click !== 'function') element=element.parentElement;
      if(element) element.click();
    }

    /* scroll */
    if(data.type==='scroll' && data.amount!==0) duiScroll(_cursorX, _cursorY, data.amount);

    /* resize instant */
    if(data.type==='resize'){ win.style.width=data.width+'px'; win.style.height=data.height+'px'; }

    /* lua drag-resize */
    if(data.type==='startResize'){ const r=win.getBoundingClientRect(); win._luaResizeW=r.width; win._luaResizeH=r.height; win.style.transform='none'; win.style.left=r.left+'px'; win.style.top=r.top+'px'; }
    if(data.type==='resizeDelta'){ win.style.width=Math.max(480,(win._luaResizeW||660)+(data.dx||0))+'px'; win.style.height=Math.max(380,(win._luaResizeH||520)+(data.dy||0))+'px'; }
    if(data.type==='stopResize'){ const r=win.getBoundingClientRect(); win._luaResizeW=r.width; win._luaResizeH=r.height; }

    /* lua drag-move */
    if(data.type==='startDrag'){
      const topBar=document.getElementById('dragHandle');
      const bottomBar=document.getElementById('bottomBar');
      const hit=document.elementFromPoint(data.x, data.y);
      const onTop   =topBar    && topBar.contains(hit)    && !hit.closest('.lib-tabs');
      const onBottom=bottomBar && bottomBar.contains(hit) && !hit.closest('.lib-bottom-right');
      if(onTop||onBottom){ const r=win.getBoundingClientRect(); win.style.transform='none'; win.style.left=r.left+'px'; win.style.top=r.top+'px'; win._luaDragOX=r.left; win._luaDragOY=r.top; win._luaDragging=true; }
      else win._luaDragging=false;
    }
    if(data.type==='dragDelta' && win._luaDragging){ win.style.left=((win._luaDragOX||0)+(data.dx||0))+'px'; win.style.top=((win._luaDragOY||0)+(data.dy||0))+'px'; }
    if(data.type==='stopDrag') win._luaDragging=false;

    /* notifications */
    if(data.type==='notify') notify(data.text, data.time||3000);

    /* create page */
    if(data.type==='createPage'){
      const page=makePage(data.name, data.icon||'home');
      window[data.id]=page;
      if(!window.firstPageLoaded){ page.activate(); window.firstPageLoaded=true; }
    }

    /* add element — callbacks are no-ops here; Lua handles all logic */
 /* add element */
    if(data.type==='element'){
      const page=window[data.page];
      if(!page) return;
      const section=page.section(data.section||'Main', data.side||1, data.icon||'cog');



if(data.element==='button'){
        const ref=section.button({
          id:data.id,
          name:data.name,
          callback:()=>{ pushEvent({ type:'elementClick', id:data.id }); }
        });
        _elementRefs[data.id]=ref;
      }

      if(data.element==='toggle'){
        const ref=section.toggle({
          id:data.id,
          name:data.name,
          default:data.value||false,
          callback:(v)=>{ pushEvent({ type:'elementChange', id:data.id, value:v }); }
        });
        _elementRefs[data.id]=ref;
      }

      if(data.element==='slider'){
        const ref=section.slider({
          id:data.id,
          name:data.name,
          min:data.min,
          max:data.max,
          default:data.value,
          callback:(v)=>{ pushEvent({ type:'elementChange', id:data.id, value:v }); }
        });
        _elementRefs[data.id]=ref;
      }

      if(data.element==='dropdown'){
        const ref=section.dropdown({
          id:data.id,
          name:data.name,
          items:data.items||[],
          callback:(v)=>{ pushEvent({ type:'elementChange', id:data.id, value:v }); }
        });
        _elementRefs[data.id]=ref;
      }

      
    }

    /* ── updateElement — Lua tells JS to visually reflect new state ── */
    if(data.type==='updateElement'){
      const id  = data.id;
      if(!id) return;

      /* try fast path via stored API ref */
      const ref = _elementRefs[id];
      if(ref){
        if(typeof ref.set === 'function' && data.value !== undefined) ref.set(data.value);
        if(typeof ref.setByIndex === 'function' && data.selected !== undefined) ref.setByIndex(data.selected - 1);
        return;
      }

      /* fallback: find by data-eid */
      const row = document.querySelector('[data-eid="'+id+'"]');
      if(!row) return;

      if(data.value !== undefined && row.classList.contains('lib-toggle')){
        row.classList.toggle('on', !!data.value);
      }

      if(data.value !== undefined && row.classList.contains('lib-slider')){
        const fill      = row.querySelector('.lib-slider-fill');
        const valueText = row.querySelector('.lib-slider-value');
        const mn = parseFloat(row.dataset.min||0);
        const mx = parseFloat(row.dataset.max||100);
        const pct = ((data.value - mn) / (mx - mn)) * 100;
        if(fill)      fill.style.width = pct+'%';
        if(valueText) valueText.textContent = Math.round(data.value*100)/100;
      }

      if(data.value !== undefined && row.classList.contains('lib-dropdown')){
        const span = row.querySelector('.lib-dropdown-box span');
        if(span) span.textContent = data.value;
        row.querySelectorAll('.lib-dropdown-option').forEach(opt=>{
          opt.classList.toggle('selected', opt.textContent===data.value);
        });
      }
    }

    /* selectElement — no visual needed, cursor handles highlight */
    /* (handler intentionally empty) */
  });

  window.LDS13_DEMO = { flags, notify };
})();
</script>

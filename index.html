<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: #e0e0e0;
    user-select: none;
  }

  #app {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
  }

  #app.visible {
    display: block;
  }

  .window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 460px;
    background: #16161a;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
  }

  .sidebar {
    width: 150px;
    background: #0c0c0e;
    padding: 16px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { display: none; }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: #e8195f;
    padding: 0 16px;
    margin-bottom: 18px;
  }

  .page-item {
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #cfcfcf;
    cursor: default;
    transition: background 0.12s, color 0.12s;
  }

  .page-item.active {
    color: #e8195f;
    background: rgba(232, 25, 95, 0.12);
  }

  .content {
    flex: 1;
    padding: 18px 20px;
    overflow-y: auto;
    position: relative;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #3a3a3e; border-radius: 2px; }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    color: #e8195f;
    margin-bottom: 14px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1d1d22;
    border: 1px solid #28282e;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }

  .control-label {
    font-size: 13px;
    font-weight: 500;
    color: #e3e3e3;
  }

  /* button */
  .btn {
    background: #e8195f;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 5px;
    padding: 6px 14px;
    pointer-events: none;
  }

  /* toggle */
  .toggle {
    width: 34px;
    height: 18px;
    background: #2a2a2e;
    border-radius: 9px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .toggle.active { background: #e8195f; }
  .toggle-dot {
    width: 14px;
    height: 14px;
    background: #8a8a8e;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: left 0.15s, background 0.15s;
  }
  .toggle.active .toggle-dot { left: 18px; background: #fff; }

  /* custom cursor */
  #cursor {
    position: absolute;
    top: 0;
    left: 0;
    width: 22px;
    height: 22px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(0, 0);
    will-change: transform;
  }

  #cursor.clicking svg path {
    fill: #e8195f;
  }
</style>
</head>
<body>

<div id="app">
  <div class="window">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="panel-title" id="pageTitle"></div>
      <div id="controls"></div>
    </div>
  </div>
</div>

<svg id="cursor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <path d="M3 2l7.5 18 2.5-7.5L20.5 10z" fill="#ffffff" stroke="#000" stroke-width="1"/>
</svg>

<script>
/*
  State model pushed entirely from Lua via MachoSendDuiMessage.
  Lua owns layout + hit-testing. This script is a pure renderer:
  it draws whatever state it's given and moves a synthetic cursor.

  Message types received (window 'message' event, e.data is JSON string):
    { type: "init",      pages: [...] }                 -> full menu definition
    { type: "show" } / { type: "hide" }                  -> toggle menu visibility
    { type: "setPage",   page: "pageId" }                 -> switch active page
    { type: "setState",  controlId: "...", value: ... }   -> update a single control's rendered value
    { type: "mouseMove", x: 123, y: 456 }                  -> move custom cursor (screen px)
    { type: "click",     x: 123, y: 456 }                  -> brief click animation on cursor
*/

let menu = { pages: [] };
let activePage = null;

const app = document.getElementById('app');
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const pageTitle = document.getElementById('pageTitle');
const controlsEl = document.getElementById('controls');
const cursor = document.getElementById('cursor');

function renderSidebar() {
  sidebar.innerHTML = '<div class="logo">MENU</div>';
  menu.pages.forEach(p => {
    const item = document.createElement('div');
    item.className = 'page-item' + (p.id === activePage ? ' active' : '');
    item.textContent = p.label;
    item.dataset.pageId = p.id;
    sidebar.appendChild(item);
  });
}

function renderPage() {
  const page = menu.pages.find(p => p.id === activePage);
  if (!page) {
    pageTitle.textContent = '';
    controlsEl.innerHTML = '';
    return;
  }
  pageTitle.textContent = page.label;
  controlsEl.innerHTML = '';

  page.controls.forEach(c => {
    const row = document.createElement('div');
    row.className = 'control-row';
    row.dataset.controlId = c.id;

    const label = document.createElement('span');
    label.className = 'control-label';
    label.textContent = c.label;
    row.appendChild(label);

    if (c.type === 'button') {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = c.buttonText || 'Confirm';
      row.appendChild(btn);
    } else if (c.type === 'toggle') {
      const toggle = document.createElement('div');
      toggle.className = 'toggle' + (c.value ? ' active' : '');
      toggle.innerHTML = '<div class="toggle-dot"></div>';
      row.appendChild(toggle);
    }

    controlsEl.appendChild(row);
  });
}

function setControlState(controlId, value) {
  const page = menu.pages.find(p => p.id === activePage);
  if (!page) return;
  const ctrl = page.controls.find(c => c.id === controlId);
  if (!ctrl) return;
  ctrl.value = value;

  const row = controlsEl.querySelector('[data-control-id="' + CSS.escape(controlId) + '"]');
  if (!row) return;
  const toggle = row.querySelector('.toggle');
  if (toggle) toggle.classList.toggle('active', !!value);
}

function moveCursor(x, y) {
  cursor.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
}

function flashClick() {
  cursor.classList.add('clicking');
  setTimeout(() => cursor.classList.remove('clicking'), 120);
}

window.addEventListener('message', function (event) {
  let msg;
  try {
    msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
  } catch (e) {
    return;
  }
  if (!msg || !msg.type) return;

  switch (msg.type) {
    case 'init':
      menu = { pages: msg.pages || [] };
      activePage = menu.pages.length ? menu.pages[0].id : null;
      renderSidebar();
      renderPage();
      break;

    case 'show':
      app.classList.add('visible');
      break;

    case 'hide':
      app.classList.remove('visible');
      break;

    case 'setPage':
      activePage = msg.page;
      renderSidebar();
      renderPage();
      break;

    case 'setState':
      setControlState(msg.controlId, msg.value);
      break;

    case 'mouseMove':
      moveCursor(msg.x, msg.y);
      break;

    case 'click':
      moveCursor(msg.x, msg.y);
      flashClick();
      break;
  }
});
</script>
</body>
</html>

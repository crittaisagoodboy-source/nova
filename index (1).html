<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:transparent;cursor:none;font-family:'Poppins',system-ui,sans-serif;user-select:none;-webkit-user-select:none}

#cursor-dot{position:fixed;width:7px;height:7px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .08s,background .12s}
#cursor-ring{position:fixed;width:26px;height:26px;border:1.5px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .15s,height .15s,border-color .15s}
body.chover #cursor-dot{background:#e74c4c;transform:translate(-50%,-50%) scale(1.5)}
body.chover #cursor-ring{width:34px;height:34px;border-color:rgba(231,76,76,.6)}
body.cclick #cursor-dot{transform:translate(-50%,-50%) scale(.5)}

.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:ripple-anim .45s linear;pointer-events:none}
@keyframes ripple-anim{to{transform:scale(2.5);opacity:0}}

#shell{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;width:960px;height:580px;background:#100b0b;border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden;opacity:0;animation:fadeIn .25s ease forwards}
@keyframes fadeIn{to{opacity:1}}

/* Sidebar */
#sidebar{width:190px;flex-shrink:0;background:#0c0808;border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;padding:0}
.brand{padding:18px 18px 14px;font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.brand span{color:#c0392b}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);cursor:none;transition:background .15s,color .15s;border-left:3px solid transparent;position:relative;overflow:hidden}
.nav-item svg{width:14px;height:14px;opacity:.7;flex-shrink:0}
.nav-item.active{background:rgba(192,57,43,.18);color:#e8e8e8;border-left-color:#c0392b}
.nav-item.hov{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.sidebar-foot{margin-top:auto;padding:14px 16px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.05)}
.avatar{width:30px;height:30px;border-radius:50%;background:#2a0e0e;display:flex;align-items:center;justify-content:center;font-size:12px;color:#c0392b;font-weight:700;flex-shrink:0}
.foot-name{font-size:12px;font-weight:600;color:#e0e0e0}
.foot-rank{font-size:10px;color:#c0392b;margin-top:1px}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:46px;flex-shrink:0;display:flex;align-items:center;gap:4px;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;font-size:12px;color:rgba(255,255,255,.4);cursor:none;transition:background .15s,color .15s;position:relative;overflow:hidden}
.tab svg{width:13px;height:13px;opacity:.7}
.tab.active{background:rgba(192,57,43,.2);color:#e8e8e8}
.tab.hov{background:rgba(255,255,255,.06);color:rgba(255,255,255,.65)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.vip-btn{padding:5px 12px;border-radius:4px;border:1px solid rgba(255,255,255,.15);font-size:11px;color:rgba(255,255,255,.7);cursor:none;transition:background .15s,color .15s;position:relative;overflow:hidden}
.vip-btn.hov{background:rgba(255,255,255,.08);color:#fff}
.gear-btn{width:28px;height:28px;border-radius:4px;background:rgba(192,57,43,.25);border:1px solid rgba(192,57,43,.4);display:flex;align-items:center;justify-content:center;cursor:none;transition:background .15s;position:relative;overflow:hidden}
.gear-btn svg{width:13px;height:13px;color:#e05a5a}
.gear-btn.hov{background:rgba(192,57,43,.4)}

/* Tab content panels inside a nav page */
#tab-area{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .22s ease;overflow:hidden;display:flex;flex-direction:column}
.tab-panel.active{opacity:1;pointer-events:all}

/* Page system (nav) */
#page-area{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.page{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .22s ease;overflow:hidden;display:flex;flex-direction:column}
.page.active{opacity:1;pointer-events:all}

/* Content grid */
.content{flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 16px}

/* Section cards */
.section{background:#140e0e;border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:0;overflow:hidden;display:flex;flex-direction:column}
.section-head{padding:10px 14px 8px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.05)}
.section-dot{width:6px;height:6px;border-radius:50%;background:#c0392b;flex-shrink:0}
.section-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:1.2px;text-transform:uppercase}
.section-body{padding:6px 10px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}

/* Feature rows */
.feat{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:4px;transition:background .12s;cursor:none;position:relative;overflow:hidden}
.feat.hov{background:rgba(255,255,255,.05)}
.feat-icon{width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.feat-icon svg{width:12px;height:12px;color:rgba(255,255,255,.5)}
.feat-name{flex:1;font-size:12px;color:rgba(255,255,255,.75);font-weight:500}
.feat.hov .feat-name{color:#fff}

/* Toggle */
.toggle{width:34px;height:19px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);position:relative;flex-shrink:0;cursor:none;transition:background .2s,border-color .2s}
.toggle.on{background:#c0392b;border-color:#a93226}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(15px)}

/* Bind btn */
.bind{width:21px;height:19px;border-radius:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:none;transition:background .12s}
.bind svg{width:10px;height:10px;color:rgba(255,255,255,.3)}
.feat.hov .bind{background:rgba(255,255,255,.1)}

/* Action buttons */
.action-btn{width:100%;padding:9px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);font-size:12px;font-weight:500;color:rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;gap:8px;cursor:none;transition:background .15s,color .15s,border-color .15s;margin-top:3px;position:relative;overflow:hidden}
.action-btn.hov{background:rgba(192,57,43,.2);border-color:rgba(192,57,43,.4);color:#e0e0e0}
.action-btn svg{width:12px;height:12px}

/* Page label header */
.page-label{padding:14px 18px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.page-label-icon{width:28px;height:28px;border-radius:6px;background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.35);display:flex;align-items:center;justify-content:center}
.page-label-icon svg{width:13px;height:13px;color:#e05a5a}
.page-label-text{font-size:13px;font-weight:600;color:#e8e8e8}
.page-label-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}

/* Inner topbar (per page tabs) */
.page-topbar{height:40px;flex-shrink:0;display:flex;align-items:center;gap:4px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.05);margin-top:8px}
.page-tab{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:11px;color:rgba(255,255,255,.4);cursor:none;transition:background .15s,color .15s;position:relative;overflow:hidden}
.page-tab.active{background:rgba(192,57,43,.2);color:#e8e8e8}
.page-tab.hov{background:rgba(255,255,255,.06);color:rgba(255,255,255,.65)}

/* Settings */
.settings-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;flex:1;overflow-y:auto;align-content:start}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#140e0e;border:1px solid rgba(255,255,255,.06);border-radius:6px}
.setting-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.75)}
.setting-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
</style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="shell">
  <div id="sidebar">
    <div class="brand"><span>w</span>ave</div>
    <div id="sidebar-nav">
      <!-- nav items injected by Wave API -->
    </div>
    <div class="sidebar-foot">
      <div class="avatar" id="foot-avatar">W</div>
      <div>
        <div class="foot-name" id="foot-name">user</div>
        <div class="foot-rank" id="foot-rank">USER</div>
      </div>
    </div>
  </div>

  <div id="main">
    <div class="topbar">
      <div id="topbar-tabs">
        <!-- top tabs injected per active nav page -->
      </div>
      <div class="topbar-right">
        <div class="vip-btn" data-action="vip">Purchase VIP Access</div>
        <div class="gear-btn" data-action="gear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>
      </div>
    </div>
    <div id="page-area">
      <!-- pages injected by Wave API -->
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  Wave UI Engine
// ══════════════════════════════════════════════════
window.Wave = (function() {

  // ── Internal state ─────────────────────────────
  const _pages    = {};   // pageName → { el, tabs: {} }
  const _states   = {};   // toggleId → bool
  const _cb       = {};   // toggleId/actionId → callback fn

  let _activePage = null;
  let _activeTopTab = {};  // pageName → activeTabName

  // ── Helpers ────────────────────────────────────
  function _emit(data) {
    if (!window._pendingEvents) window._pendingEvents = [];
    window._pendingEvents.push(data);
    window.postMessage(data, '*');
  }

  function _ripple(el, x, y) {
    const r = el.getBoundingClientRect();
    const rip = document.createElement('span');
    const sz = Math.max(r.width, r.height);
    rip.className = 'ripple';
    rip.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(x-r.left-sz/2)+'px;top:'+(y-r.top-sz/2)+'px;';
    el.appendChild(rip);
    rip.addEventListener('animationend', () => rip.remove());
  }

  function _isOver(el, x, y) {
    const r = el.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }

  function _bindIcon() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>`;
  }

  // ── Get or create a nav page ───────────────────
  function _getOrCreatePage(pageName) {
    if (_pages[pageName]) return _pages[pageName];

    // sidebar nav item
    const nav = document.createElement('div');
    nav.className = 'nav-item';
    nav.dataset.nav = pageName;
    nav.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>${pageName}`;
    document.getElementById('sidebar-nav').appendChild(nav);

    // page container
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.id = 'page-' + pageName;
    pageEl.innerHTML = `
      <div class="page-label">
        <div class="page-label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg></div>
        <div><div class="page-label-text">${pageName}</div><div class="page-label-sub">Wave menu</div></div>
      </div>
      <div class="page-topbar" id="pt-${pageName}"></div>
      <div id="tab-area-${pageName}" style="flex:1;overflow:hidden;position:relative"></div>
    `;
    document.getElementById('page-area').appendChild(pageEl);

    _pages[pageName] = { el: pageEl, nav: nav, tabs: {}, firstTab: null };

    // activate first page automatically
    if (!_activePage) _showPage(pageName);

    return _pages[pageName];
  }

  // ── Get or create a tab inside a nav page ──────
  function _getOrCreateTab(pageName, tabName) {
    const pg = _getOrCreatePage(pageName);
    if (pg.tabs[tabName]) return pg.tabs[tabName];

    // tab button in the per-page topbar
    const tabBtn = document.createElement('div');
    tabBtn.className = 'page-tab';
    tabBtn.dataset.pagetab = tabName;
    tabBtn.dataset.page = pageName;
    tabBtn.textContent = tabName;
    document.getElementById('pt-' + pageName).appendChild(tabBtn);

    // tab panel
    const panel = document.createElement('div');
    panel.className = 'tab-panel';
    panel.id = 'tp-' + pageName + '-' + tabName;

    // two-column grid inside
    const grid = document.createElement('div');
    grid.className = 'content';
    grid.id = 'tg-' + pageName + '-' + tabName;
    panel.appendChild(grid);

    document.getElementById('tab-area-' + pageName).appendChild(panel);

    pg.tabs[tabName] = { panel, grid, left: null, right: null };

    // activate first tab automatically
    if (!pg.firstTab) {
      pg.firstTab = tabName;
      _showTab(pageName, tabName);
    }

    return pg.tabs[tabName];
  }

  // ── Get or create a section inside a tab ───────
  function _getSection(pageName, tabName, side) {
    // side: 'left' or 'right'
    const tab = _getOrCreateTab(pageName, tabName);
    if (side === 'left') {
      if (!tab.left) {
        const sec = _makeSection('');
        tab.grid.appendChild(sec.wrap);
        tab.left = sec;
      }
      return tab.left;
    } else {
      if (!tab.right) {
        const sec = _makeSection('');
        tab.grid.appendChild(sec.wrap);
        tab.right = sec;
      }
      return tab.right;
    }
  }

  function _makeSection(title) {
    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.innerHTML = `
      <div class="section-head"><div class="section-dot"></div><span class="section-title">${title}</span></div>
      <div class="section-body"></div>
    `;
    return { wrap, body: wrap.querySelector('.section-body'), titleEl: wrap.querySelector('.section-title') };
  }

  // ── Show nav page ──────────────────────────────
  function _showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const pg = _pages[name];
    if (!pg) return;
    pg.el.classList.add('active');
    pg.nav.classList.add('active');
    _activePage = name;
  }

  // ── Show tab inside page ───────────────────────
  function _showTab(pageName, tabName) {
    const pg = _pages[pageName];
    if (!pg) return;
    Object.values(pg.tabs).forEach(t => t.panel.classList.remove('active'));
    document.querySelectorAll(`[data-page="${pageName}"]`).forEach(b => b.classList.remove('active'));
    const tab = pg.tabs[tabName];
    if (!tab) return;
    tab.panel.classList.add('active');
    _activeTopTab[pageName] = tabName;
    const btn = document.querySelector(`[data-pagetab="${tabName}"][data-page="${pageName}"]`);
    if (btn) btn.classList.add('active');
  }

  // ═══════════════════════════════════════════════
  //  PUBLIC API
  // ═══════════════════════════════════════════════

  /**
   * Wave.SetUser(name, rank, initial)
   * Sets the sidebar footer name, rank, and avatar initial.
   */
  function SetUser(name, rank, initial) {
    document.getElementById('foot-name').textContent = name || 'user';
    document.getElementById('foot-rank').textContent = rank || 'USER';
    document.getElementById('foot-avatar').textContent = (initial || name || 'U')[0].toUpperCase();
  }

  /**
   * Wave.CreatePage(pageName)
   * Creates a sidebar nav entry and a blank page.
   * Returns the page object (rarely needed directly).
   */
  function CreatePage(pageName) {
    return _getOrCreatePage(pageName);
  }

  /**
   * Wave.CreateTopTab(tabName, pageName)
   * Creates a tab inside the given page's inner topbar.
   * All buttons/toggles added to this tabName+pageName combo
   * will appear in this tab.
   */
  function CreateTopTab(tabName, pageName) {
    _getOrCreateTab(pageName, tabName);
  }

  /**
   * Wave.CreateButton(label, tabName, pageName, callback, side?)
   * Adds an action button to the given tab on the given page.
   * side: 'left' (default) or 'right'
   */
  function CreateButton(label, tabName, pageName, callback, side) {
    side = side || 'left';
    const sec = _getSection(pageName, tabName, side);
    const id = 'act-' + pageName + '-' + tabName + '-' + label.replace(/\s/g,'_');

    const btn = document.createElement('div');
    btn.className = 'action-btn';
    btn.dataset.action = id;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:13px;height:13px"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>${label}`;
    sec.body.appendChild(btn);

    if (callback) _cb[id] = callback;
    return btn;
  }

  /**
   * Wave.CreateToggle(label, tabName, pageName, callback, side?)
   * Adds a toggle row to the given tab on the given page.
   * callback(state: bool) is called on change.
   * side: 'left' (default) or 'right'
   */
  function CreateToggle(label, tabName, pageName, callback, side) {
    side = side || 'left';
    const sec = _getSection(pageName, tabName, side);
    const id = 'tog-' + pageName + '-' + tabName + '-' + label.replace(/\s/g,'_');

    _states[id] = false;

    const row = document.createElement('div');
    row.className = 'feat';
    row.dataset.toggle = id;
    row.innerHTML = `
      <div class="feat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/></svg></div>
      <span class="feat-name">${label}</span>
      <div class="toggle" id="${id}"></div>
      <div class="bind">${_bindIcon()}</div>
    `;
    sec.body.appendChild(row);

    if (callback) _cb[id] = callback;
    return row;
  }

  /**
   * Wave.SetToggleState(id, state)
   * Programmatically set a toggle state (from Lua).
   */
  function SetToggleState(id, state) {
    _states[id] = state;
    const el = document.getElementById(id);
    if (el) el.classList.toggle('on', state);
  }

  /**
   * Wave.SetSectionTitle(pageName, tabName, side, title)
   * Renames the section header of left/right column.
   */
  function SetSectionTitle(pageName, tabName, side, title) {
    const sec = _getSection(pageName, tabName, side || 'left');
    if (sec.titleEl) sec.titleEl.textContent = title;
  }

  // ── Internal: handle all clickable elements ────
  function _allClickable() {
    return [
      ...document.querySelectorAll('.nav-item'),
      ...document.querySelectorAll('.page-tab'),
      ...document.querySelectorAll('.feat'),
      ...document.querySelectorAll('.action-btn'),
      document.querySelector('.vip-btn'),
      document.querySelector('.gear-btn'),
    ].filter(Boolean);
  }

  // ── Message handler (from Lua via MachoSendDuiMessage) ──
  window.addEventListener('message', ev => {
    const d = ev.data;
    if (!d || !d.type) return;

    if (d.type === 'mouseMove') {
      const dot  = document.getElementById('cursor-dot');
      const ring = document.getElementById('cursor-ring');
      dot.style.left  = d.x + 'px'; dot.style.top  = d.y + 'px';
      ring.style.left = d.x + 'px'; ring.style.top = d.y + 'px';

      let any = false;
      _allClickable().forEach(el => {
        if (_isOver(el, d.x, d.y)) { el.classList.add('hov'); any = true; }
        else el.classList.remove('hov');
      });
      document.body.classList.toggle('chover', any);
    }

    if (d.type === 'click') {
      document.body.classList.add('cclick');
      setTimeout(() => document.body.classList.remove('cclick'), 110);

      _allClickable().forEach(el => {
        if (!_isOver(el, d.x, d.y)) return;
        _ripple(el, d.x, d.y);

        // nav page switch
        if (el.dataset.nav) {
          _showPage(el.dataset.nav);
          _emit({ type: 'nav', page: el.dataset.nav });
        }

        // inner tab switch
        if (el.dataset.pagetab && el.dataset.page) {
          _showTab(el.dataset.page, el.dataset.pagetab);
        }

        // toggle
        if (el.dataset.toggle) {
          const id = el.dataset.toggle;
          _states[id] = !_states[id];
          const tog = document.getElementById(id);
          if (tog) tog.classList.toggle('on', _states[id]);
          if (_cb[id]) _cb[id](_states[id]);
          _emit({ type: 'feature', feature: id, state: _states[id] });
        }

        // action
        if (el.dataset.action) {
          const id = el.dataset.action;
          if (_cb[id]) _cb[id]();
          _emit({ type: 'action', action: id });
        }
      });
    }

    // Lua can push setState: { type:'setState', feature:'tog-...', state:true }
    if (d.type === 'setState') {
      SetToggleState(d.feature, d.state);
    }
  });

  // ── Public surface ─────────────────────────────
  return {
    SetUser,
    CreatePage,
    CreateTopTab,
    CreateButton,
    CreateToggle,
    SetToggleState,
    SetSectionTitle,
  };

})();
</script>
</body>
